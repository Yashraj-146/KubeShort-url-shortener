apiVersion: apps/v1
kind: Deployment

metadata:
  name: url-shortener
  namespace: url-shortener

spec:
  replicas: 2

  strategy:
    type: RollingUpdate

    rollingUpdate:
      maxSurge: 1
      maxUnavailable: 0

  selector:
    matchLabels:
      app: url-shortener

  template:
    metadata:
      labels:
        app: url-shortener

    spec:
      containers:
        - name: url-shortener

          image: url-shortener-app:latest

          imagePullPolicy: Never

          ports:
            - containerPort: 3000

          envFrom:
            - configMapRef:
                name: url-shortener-config

            - secretRef:
                name: url-shortener-secret

          command:
            - sh
            - -c

          args:
            - |
              npx prisma migrate deploy && node dist/server.js

          readinessProbe:
            httpGet:
              path: /api/v1/health
              port: 3000

            initialDelaySeconds: 10
            periodSeconds: 5
            timeoutSeconds: 2
            failureThreshold: 3

          livenessProbe:
            httpGet:
              path: /api/v1/health
              port: 3000

            initialDelaySeconds: 20
            periodSeconds: 10
            timeoutSeconds: 2
            failureThreshold: 3

          resources:
            requests:
              cpu: "250m"
              memory: "256Mi"

            limits:
              cpu: "500m"
              memory: "512Mi"